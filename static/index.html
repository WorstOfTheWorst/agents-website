<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Agents Site</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <!-- Блок статуса -->
  <div class="status-bar">
    <div class="status-item">
      <div>Маришка</div>
      <div class="status" id="status-mariska">checking...</div>
    </div>
    <div class="status-item">
      <div>Алексей</div>
      <div class="status" id="status-aleksey">checking...</div>
    </div>
    <div class="status-item">
      <div>OpenClaw</div>
      <div class="status" id="status-openclaw">checking...</div>
    </div>
    <div class="status-item">
      <div id="comfyui-label">ComfyUI</div>
      <div class="status" id="status-comfyui">checking...</div>
    </div>
  </div>

  <!-- Блок задач -->
  <div class="status-bar tasks-bar">
    <div class="status-item">
      <div class="info">
        <h2>Маришка</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
    <div class="status-item">
      <div class="info">
        <h2>Алексей</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
    <div class="status-item">
      <div class="info">
        <h2>OpenClaw</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
    <div class="status-item">
      <div class="info">
        <h2>ComfyUI</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
  </div>

  <!-- Поле ввода IP адреса ComfyUI -->
  <div class="comfy-ip-input" style="margin: 20px;">
    <label for="comfy-ip">IP‑адрес ComfyUI:</label>
    <input type="text" id="comfy-ip" placeholder="например: 192.168.0.113:8188" style="margin-left: 8px;" />
    <button id="save-comfy-ip" style="margin-left: 8px;">Сохранить</button>
  </div>

  <script src="/static/js/script.js"></script>
</body>
</html>
