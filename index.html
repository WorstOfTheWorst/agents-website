<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Agents Site</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Блок статуса -->
  <div class="status-bar">
    <div class="status-item">
      <div>Маришка</div>
      <div class="status" id="status-mariska">checking...</div>
    </div>
    <div class="status-item">
      <div>OpenClaw</div>
      <div class="status" id="status-openclaw">checking...</div>
    </div>
    <div class="status-item">
      <div>ComfyUI</div>
      <div class="status" id="status-comfyui">checking...</div>
    </div>
  </div>

  <!-- Блок задач -->
  <div class="status-bar tasks-bar">
    <div class="status-item">
      <div class="info">
        <h2>Задачи Маришки</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
    <div class="status-item">
      <div class="info">
        <h2>Задачи OpenClaw</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
    <div class="status-item">
      <div class="info">
        <h2>Задачи ComfyUI</h2>
      </div>
      <div class="tasks-section">
        <div class="tasks"></div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
